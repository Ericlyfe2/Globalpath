services:
  postgres:
    image: postgres:16-alpine
    container_name: globalpath_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: globalpath
      POSTGRES_PASSWORD: globalpath_dev
      POSTGRES_DB: globalpath
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./db/migration_002.sql:/docker-entrypoint-initdb.d/02_migration.sql

  redis:
    image: redis:7-alpine
    container_name: globalpath_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
